name: CI

on:
  push:
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build coordinator image
        uses: docker/build-push-action@v6
        with:
          context: ./platform/server-api
          file: ./platform/server-api/Dockerfile
          push: false
          tags: coordinator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: ./platform/worker-node
          file: ./platform/worker-node/Dockerfile
          push: false
          tags: worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
